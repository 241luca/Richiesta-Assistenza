version: '3.8'

# ==========================================
# DOCKER COMPOSE PRODUCTION - VPS
# Richiesta Assistenza - Sistema Gestionale
# ==========================================
# ⚠️ IMPORTANTE:
# - Usa immagini pre-compilate da GitHub Container Registry
# - Configurato per deploy su VPS con porte standard (80, 443)
# - Richiede file .env.production con credenziali sicure
# - Volume bind mounts su /data per backup facili
# ==========================================

services:
  # ==========================================
  # DATABASE - PostgreSQL 16
  # ==========================================
  database:
    image: postgres:16-alpine
    container_name: assistenza-database
    restart: always
    environment:
      POSTGRES_DB: assistenza_db
      POSTGRES_USER: assistenza_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Bind mount per backup facile
      - /data/richiesta-assistenza/postgres:/var/lib/postgresql/data
    # Porta esposta solo per connessioni esterne (psql, pgAdmin)
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistenza_user -d assistenza_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - assistenza-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # REDIS - Cache e Job Queue
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: assistenza-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - /data/richiesta-assistenza/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - assistenza-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==========================================
  # BACKEND - Express API
  # Immagine pre-compilata da GitHub Container Registry
  # ==========================================
  backend:
    image: ghcr.io/241luca/richiesta-assistenza-backend:latest
    container_name: assistenza-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3200
      # Database (porta interna 5432)
      DATABASE_URL: postgresql://assistenza_user:${DB_PASSWORD}@database:5432/assistenza_db
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Security
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      # URLs
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ALLOWED_ORIGINS: ${FRONTEND_URL}
      # Email
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    volumes:
      # Bind mounts per backup facile
      - /data/richiesta-assistenza/uploads:/app/uploads
      - /data/richiesta-assistenza/logs:/app/logs
      - /data/richiesta-assistenza/backups:/app/backups
    # Porta NON esposta (accessibile solo via Nginx)
    expose:
      - "3200"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3200/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - assistenza-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # FRONTEND - React + Nginx
  # Immagine pre-compilata da GitHub Container Registry
  # ==========================================
  frontend:
    image: ghcr.io/241luca/richiesta-assistenza-frontend:latest
    container_name: assistenza-frontend
    restart: always
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Certificati SSL Let's Encrypt
      - /etc/letsencrypt:/etc/nginx/certs:ro
      # Configurazione Nginx custom (opzionale)
      - ./nginx-production.conf:/etc/nginx/nginx.conf:ro
    networks:
      - assistenza-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==========================================
# VOLUMES - Non usati (bind mounts su /data)
# ==========================================
# volumes:
#   (Nessun named volume, tutto su bind mounts)

# ==========================================
# NETWORK - Comunicazione interna
# ==========================================
networks:
  assistenza-network:
    driver: bridge
