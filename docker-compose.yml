version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: assistenza_postgres
    environment:
      POSTGRES_DB: assistenza_db
      POSTGRES_USER: assistenza_user
      POSTGRES_PASSWORD: assistenza_pass_2024
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assistenza_network

  redis:
    image: redis:7-alpine
    container_name: assistenza_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - assistenza_network

volumes:
  postgres_data:
  redis_data:

networks:
  assistenza_network:
    driver: bridge
