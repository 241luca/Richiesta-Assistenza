version: '3.8'

services:
  # ==========================================
  # DATABASE - PostgreSQL
  # ==========================================
  database:
    image: postgres:16-alpine
    container_name: assistenza-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: assistenza_db
      POSTGRES_USER: assistenza_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-local_dev_password_123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/backup  # Per import/export dati
    ports:
      - "5434:5432"  # ⚠️ PORTA HOST MODIFICATA per evitare conflitti
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistenza_user -d assistenza_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assistenza-network

  # ==========================================
  # REDIS - Cache e Code
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: assistenza-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6382:6379"  # Porta modificata per evitare conflitti
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-local_redis_password_123}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - assistenza-network

  # ==========================================
  # BACKEND - Express API
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assistenza-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3200
      # Connessione al database PostgreSQL Docker
      DATABASE_URL: postgresql://assistenza_user:${DB_PASSWORD:-local_dev_password_123}@database:5432/assistenza_db?schema=public
      # Usa script che salta le migrazioni problematiche
      START_COMMAND: npm run start:prod:skip-migrations
      REDIS_URL: redis://:${REDIS_PASSWORD:-local_redis_password_123}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-local_redis_password_123}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ALLOWED_ORIGINS: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_backups:/app/backups
    command: ${START_COMMAND:-npm run start:prod:skip-migrations}
    ports:
      - "3210:3200"  # Esposto per Nginx centrale di Agenda in VPS
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3200/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - assistenza-network

  # ==========================================
  # FRONTEND - React + Nginx
  # ⚠️ DISABILITATO - Usare Nginx centrale di Agenda in VPS
  # ==========================================
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.frontend
  #     args:
  #       VITE_API_URL: ${BACKEND_URL}
  #   container_name: assistenza-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "8084:80"  # ⚠️ PORTA HTTP MODIFICATA
  #     - "8443:443"  # ⚠️ PORTA HTTPS MODIFICATA
  #   depends_on:
  #     - backend
  #   volumes:
  #     - ./nginx/certs:/etc/nginx/certs:ro
  #   networks:
  #     - assistenza-network

# ==========================================
# VOLUMES - Dati persistenti
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  backend_backups:
    driver: local

# ==========================================
# NETWORK - Comunicazione interna
# ==========================================
networks:
  assistenza-network:
    driver: bridge
