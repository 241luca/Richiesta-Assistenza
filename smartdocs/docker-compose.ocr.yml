version: '3.8'

services:
  # Marker OCR Service
  marker-ocr:
    build:
      context: ./docker/marker
      dockerfile: Dockerfile
    container_name: smartdocs-marker
    ports:
      - "8001:8001"
    environment:
      - TORCH_DEVICE=cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # PaddleOCR Service
  paddle-ocr:
    build:
      context: ./docker/paddle
      dockerfile: Dockerfile
    container_name: smartdocs-paddle
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
