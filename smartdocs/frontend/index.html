<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDocs - API Keys Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div id="app" class="min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <i class="fas fa-key text-blue-600 text-2xl mr-3"></i>
                        <div>
                            <h1 class="text-2xl font-bold text-gray-900">SmartDocs</h1>
                            <p class="text-sm text-gray-600">API Keys Management</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="px-3 py-1 text-sm bg-green-100 text-green-800 rounded-full">
                            <i class="fas fa-check-circle mr-1"></i>
                            Connected
                        </span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
            <!-- Alert Area -->
            <div id="alertArea"></div>

            <!-- API Keys Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="apiKeysGrid">
                <!-- Cards will be inserted here -->
            </div>
        </main>

        <!-- Modal -->
        <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-bold text-gray-900" id="modalTitle">Configure API Key</h2>
                        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>

                    <form id="apiKeyForm" onsubmit="saveApiKey(event)">
                        <input type="hidden" id="formService" name="service">
                        
                        <div class="space-y-4">
                            <!-- Service Name (readonly) -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Service</label>
                                <input type="text" id="formServiceName" readonly
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50">
                            </div>

                            <!-- API Key Input -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">
                                    API Key <span class="text-red-500">*</span>
                                </label>
                                <div class="relative">
                                    <input type="password" id="formKeyValue" name="key_value" required
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        placeholder="Enter API key...">
                                    <button type="button" onclick="togglePasswordVisibility()" 
                                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                        <i class="fas fa-eye" id="eyeIcon"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Description -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                                <textarea id="formDescription" name="description" rows="3"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                    placeholder="Optional description..."></textarea>
                            </div>

                            <!-- Metadata (JSON) -->
                            <div id="metadataSection" class="hidden">
                                <label class="block text-sm font-medium text-gray-700 mb-2">
                                    Additional Configuration (JSON)
                                </label>
                                <textarea id="formMetadata" name="metadata" rows="4"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                                    placeholder='{"endpoint": "https://api.example.com", "org_id": "..."}'></textarea>
                            </div>

                            <!-- Active Status -->
                            <div class="flex items-center">
                                <input type="checkbox" id="formIsActive" name="is_active" checked
                                    class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                <label for="formIsActive" class="ml-2 text-sm text-gray-700">
                                    Active
                                </label>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="flex gap-3 mt-6 pt-6 border-t">
                            <button type="submit" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                                <i class="fas fa-save mr-2"></i>
                                Save
                            </button>
                            <button type="button" onclick="closeModal()" 
                                class="flex-1 bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
