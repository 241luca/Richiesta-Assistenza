# SmartDocs Nginx Configuration
# Reverse proxy per API e Admin UI

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Timeout settings
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;

    # Client body size (per upload documenti)
    client_max_body_size 100M;

    # Upstream per SmartDocs API
    upstream smartdocs_api {
        server smartdocs-api:3500;
    }

    # Upstream per Admin UI
    upstream smartdocs_admin {
        server smartdocs-admin:3501;
    }

    # Server principale
    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ===========================================
        # API Routes - Proxy verso smartdocs-api:3500
        # ===========================================
        location /api/ {
            proxy_pass http://smartdocs_api/api/;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers (se necessario)
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            
            # OPTIONS preflight
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Health check API
        location /health {
            proxy_pass http://smartdocs_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # ===========================================
        # Admin UI - Proxy verso smartdocs-admin:3501
        # ===========================================
        location / {
            proxy_pass http://smartdocs_admin/;
            proxy_http_version 1.1;
            
            # Headers per Vite HMR (Hot Module Replacement)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support per Vite HMR
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
